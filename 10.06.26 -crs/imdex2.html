<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">

</head>


<body class="p-6 bg-gray-250"><center>


    <div class="p-6 bg-blue">

        <h1 class="text-lg font-semibold">Kullanıcı Sorgula</h1><br><br><br>

        <div class="mb-3">

            <input type="number" id="user-id" placeholder="Kullanıcı ID(1-3)"class="p-2 border">

        </div>


        <button id="btn-search" class="p-2 bg-yellow-100">Kullanıcı Sorgula</button>

        <div id="result" class="mt-3 p-4">Sorgulama Yapılmadı</div>

    </div>





    <script>


        //asenkron veri sorgulama

        const kullaniciSorgula = (id, onSuccess, onError)=>{

            setTimeout(()=>{
                const veriTabani={
                    1:{isim: 'Ali', rol: 'Yapay Zeka Uzmanı'},
                    2:{isim: 'Onur', rol:'IT Çalışanı'},
                    3:{isim: 'Ezgi', rol:'Sınıf Başkanı'},
                }


                const kullanici= veriTabani[id];

                
                
                if(kullanici){

                    onSuccess(kullanici);
                }
                else {
                    onError('Hata: Girilen ID ('+id+') veri tabanında bulunamadı!');
                }
              
            
                  }, 1500)

        }






        document.getElementById('btn-search').addEventListener('click', ()=> {

            const output = document.getElementById('result');

            const inputId = document.getElementById('user-id').value;


            output.innerText='Sorgulanıyor...';
            output.className='mt-4 p-2';



            kullaniciSorgula(
                inputId, (kullanici)=>{
                    output.className='m-4 bg-green-100';
                    output.innerHTML=`<strong>Kullanıcı Bulundu!</strong><br>İsim:${kullanici.isim}<br>Rol:${kullanici.rol}`;
                },

                (hataMesaji)=>{
                    output.className='mt-4 bg-red-100';
                    output.innerText=hataMesaji;

                }
            )
        })



    </script>



    
</body></center>




</html>
