<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Tracking Demo</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">

</head>

<body class="bg-gray-100 p-10 font-sans">


    <h1 class="text-xl font-bold mb-6">Tailwind Tracking Examples</h1>


    <div class="space-y-4 text-lg">

        <p class="tracking-tighter bg-white p-3 border rounded">
            tracking-tighter Harfler çok sıkı
        </p>

        <p class="tracking-tight bg-white p-3 border rounded">
            tracking-tight Biraz sıkı
        </p>

        <p class="tracking-normal bg-white p-3 border rounded">
            tracking-normal Normal yazı
        </p>

        <p class="tracking-wide bg-white p-3 border rounded">
            tracking-wide Biraz açık
        </p>

        <p class="tracking-wider bg-white p-3 border rounded">
            tracking-wider Daha açık
        </p>

        <p class="tracking-widest bg-white p-3 border rounded">
            tracking-widest En açık
        </p>

    </div>

</body>


</html>
