<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>


    <title>E-Ticaret</title>

</head>



<body class="p-6 bg-gray-200"><center>

<div class="p-6 bg-white">

    <h1 class="text-xl font-bold">E-Ticaret Sepet Yönetimi</h1>


    <div class="p-4 border">

        <h2 class="text-lg font-bold">Ürün Katalog</h2>

        <input type="text" id="search-input" placeholder="Ürün Adı" class="p-2 border">

        <button id="btn-search" class="p-2 bg-blue-200">Katalog Güncelle</button>

        <div id="product-list" class="mt-4 space-y-2">
            <p class="text-gray-500">Ürünleri yüklemek için butona tıkla</p>
        </div>

    </div><br>



    <div class="p-4 border">

        <h2 class="text-lg font-bold">Sepet</h2>

        <ul id="cart-list" class="list-disc pl-5 space-y-1">
            <li>Sepet boş</li>
        </ul>

        <div class="mt-2 font-bold">
            Toplam: <span id="cart-total">0</span> TL
        </div>

        <button id="btn-checkout" class="p-2 bg-green-200 mt-2">
            Siparişi Tamamla
        </button>

    </div>

</div>


<div id="status" class="p-2 border mt-4">Hazır</div>

<script>

let urunler = [];
let sepet = [];


const urunleriSorgula = async () => {

    const searchVal = document.getElementById('search-input').value.toLowerCase();
    const listDiv = document.getElementById('product-list');
    const status = document.getElementById('status');

    status.innerText = "Ürünler yükleniyor...";

    try {
        const response = await axios.get('https://kodusta.com/api/urunler.json');
        urunler = response.data;
    } catch (e) {
        console.log("API hata → yedek veri kullanıldı");

        urunler = [
            { id: 1, title: "Akıllı Telefon", kategori: "Elektronik", fiyat: 15000, stok: 5 },
            { id: 2, title: "Ceket", kategori: "Giyim", fiyat: 5000, stok: 0 },
            { id: 3, title: "Kuru Fasulye", kategori: "Yemek", fiyat: 400, stok: 2 },
            { id: 4, title: "Spor Ayakkabı", kategori: "Ayakkabı", fiyat: 3000, stok: 5 }
        ];
    }



    const filtrelenmis = urunler.filter(u =>
        u.title.toLowerCase().includes(searchVal)
    );

    listDiv.innerHTML = "";

    if (filtrelenmis.length === 0) {
        listDiv.innerHTML = "<p>Ürün bulunamadı</p>";
        return;
    }

    filtrelenmis.forEach(urun => {

        const div = document.createElement("div");
        div.className = "p-2 border";

        div.innerHTML = `
            <strong>${urun.title}</strong><br>
            Kategori: ${urun.kategori}<br>
            Fiyat: ${urun.fiyat} TL | Stok: ${urun.stok}<br>
            <button class="p-1 bg-yellow-200 text-xs"
                onclick="sepeteEkle(${urun.id})">
                Sepete Ekle
            </button>
        `;

        listDiv.appendChild(div);
    });
};



const stokKontrol = (urun) => {

    return new Promise((resolve, reject) => {

        setTimeout(() => {

            if (urun && urun.stok > 0) {
                resolve("OK");
            } else {
                reject("Stok yok");
            }

        }, 400);

    });

};




const sepetGuncelle = (callback) => {

    const cartList = document.getElementById("cart-list");
    cartList.innerHTML = "";

    sepet.forEach(item => {
        const li = document.createElement("li");
        li.innerText = `${item.title} - ${item.fiyat} TL`;
        cartList.appendChild(li);
    });

    const toplam = sepet.reduce((sum, item) => sum + item.fiyat, 0);

    callback(toplam);
};




window.sepeteEkle = async (urunId) => {

    const status = document.getElementById("status");

    const urun = urunler.find(u => u.id === Number(urunId));

    if (!urun) {
        status.innerText = "Ürün bulunamadı";
        return;
    }

    try {

        await stokKontrol(urun);

        sepet.push(urun);

        sepetGuncelle((toplam) => {
            document.getElementById("cart-total").innerText = toplam;
            status.innerText = `${urun.title} sepete eklendi`;
        });

    } catch (e) {
        status.innerText = e;
    }
};




const siparisiTamamla = async () => {

    const status = document.getElementById("status");

    if (sepet.length === 0) {
        status.innerText = "Sepet boş";
        return;
    }

    try {

        const response = await fetch("https://jsonplaceholder.typicode.com/posts", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                sepet,
                toplam: Number(document.getElementById("cart-total").innerText)
            })
        });

        const data = await response.json();

        status.innerText = "Sipariş alındı ID: " + data.id;

        sepet = [];

        sepetGuncelle((toplam) => {
            document.getElementById("cart-total").innerText = 0;
            document.getElementById("cart-list").innerHTML = "<li>Sepet boş</li>";
        });

    } catch (e) {
        status.innerText = "Sipariş hata";
    }
};




document.getElementById("btn-search").addEventListener("click", urunleriSorgula);
document.getElementById("btn-checkout").addEventListener("click", siparisiTamamla);

</script>

</body></center>
</html>
